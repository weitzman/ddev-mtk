name: Build and publish a database image

on:
  pull_request:
  push:
    branches:
      - 'feature/*db-*' # Runs for any well named branch
  workflow_dispatch:
  schedule:
    - cron: '35 7 * * *'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: EXAMPLE/database

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            # Use a large runner if needed.
            runner: ubuntu-24.04
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Prepare env vars
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> "$GITHUB_ENV"
          echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Install Acquia CLI
        run: |
          curl -OL https://github.com/acquia/cli/releases/latest/download/acli.phar
          chmod +x acli.phar
          sudo mv acli.phar /usr/local/bin/acli

      - name: Get DB Dump
        run: |
          acli -n auth:login --key="${{ secrets.ACQUIA_API_KEY }}" --secret="${{ secrets.ACQUIA_API_SECRET }}"
          db_dump=$(acli pull:db EXAMPLE.prod default --no-interaction --no-import | tail -2l | xargs |  sed 's/^.* //')
          mv ${db_dump} .github/database/dump.sql.gz

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .github/database
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/EXAMPLE/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - run: echo "DATE=$(date +'%Y-%m-%d')" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag ${{ env.REGISTRY }}/EXAMPLE/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ env.REGISTRY }}/EXAMPLE/${{ env.IMAGE_NAME }}:${{ env.DATE }} \
            $(printf '${{ env.REGISTRY }}/EXAMPLE/${{ env.IMAGE_NAME }}@sha256:%s ' *)

  cleanup:
    needs: merge
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Delete older tagged database images
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: EXAMPLE
          token: ${{ secrets.GHCR_DELETE_TOKEN }}
          image-names: EXAMPLE/database
          tag-selection: tagged
          keep-n-most-recent: 30
          cut-off: 1h

      - name: Delete orphaned untagged database images
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: EXAMPLE
          token: ${{ secrets.GHCR_DELETE_TOKEN }}
          image-names: EXAMPLE/database
          tag-selection: untagged
          cut-off: 1h
